<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Orçamentos - South Custom</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-item: #1e2533;
            --input-bg: #111827;
            --primary: #3b82f6;
            --accent: #10b981;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            min-height: 100vh;
        }

        .container {
            display: flex;
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            flex: 1;
        }

        .calculadora { flex: 2; }

        .section {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: center;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
        }

        .logo-img {
            height: 150px;
            width: 150;
        }

        h3 { margin: 0 0 15px 0; color: var(--text-dim); font-size: 1rem; }

        .item-linha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-item);
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }

        .label-preco { color: var(--accent); font-weight: 500; margin-left: 8px; }

        .controles { display: flex; align-items: center; gap: 12px; }
        .btn-qty {
            background: var(--danger); border: none; color: white;
            width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
            font-weight: bold;
        }
        .btn-qty.plus { background: var(--accent); }
        .qty-val { width: 40px; text-align: center; background: transparent; border: none; color: white; font-size: 1.1rem; }

        .resumo {
            flex: 1;
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .resumo-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 18px;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
        }

        .total-valor { font-size: 2.2rem; color: var(--accent); font-weight: bold; margin-top: 5px; }

        footer {
            text-align: center;
            padding: 30px;
            margin-top: 50px;
            border-top: 1px solid #334155;
            color: var(--text-dim);
            font-size: 0.9rem;
            width: 100%;
            max-width: 1200px;
        }

        .dev-name {
            color: var(--accent);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<header>
    <img src="southcustom.png" alt="Logo South Custom" class="logo-img">
</header>

<br>
<br>
<br>
<br>

<h1>
    SITE TEMPORARIAMENTE FORA DO AR
</h1>


</body>
</html>
