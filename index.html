<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Orçamentos - Profissional</title>
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-item: #1e2533;
            --input-bg: #111827;
            --primary: #3b82f6;
            --accent: #10b981;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            min-height: 100vh;
        }

        .container {
            display: flex;
            gap: 25px;
            max-width: 1200px;
            width: 100%;
            flex: 1;
        }

        .calculadora { flex: 2; }

        .section {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid #334155;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            height: 150px;
            width: 150px;
        }

        h3 { margin: 0 0 15px 0; color: var(--text-dim); font-size: 1rem; }

        .item-linha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-item);
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }

        .label-preco { color: var(--accent); font-weight: 500; margin-left: 8px; }

        .controles { display: flex; align-items: center; gap: 12px; }
        .btn-qty {
            background: var(--danger); border: none; color: white;
            width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
            font-weight: bold;
        }
        .btn-qty.plus { background: var(--accent); }
        .qty-val { width: 40px; text-align: center; background: transparent; border: none; color: white; font-size: 1.1rem; }

        .resumo {
            flex: 1;
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .resumo-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 18px;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
        }

        .total-valor { font-size: 2.2rem; color: var(--accent); font-weight: bold; margin-top: 5px; }

        footer {
            text-align: center;
            padding: 30px;
            margin-top: 50px;
            border-top: 1px solid #334155;
            color: var(--text-dim);
            font-size: 0.9rem;
            width: 100%;
            max-width: 1200px;
        }

        .dev-name {
            color: var(--accent);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<header>
    <div class="header-logo">
        <img src="southcustom.png" alt="Logo Rise Custom" class="logo-img">
    </div>
</header>

<div class="container">
    <div class="calculadora">
        <div class="section">
            <h3>🛒 Produtos </h3>
            
            <div class="item-linha">
                <span>Kit Reparo Comum <span class="label-preco">R$ 2.000,00</span></span>
                <div class="controles">
                    <button class="btn-qty" onclick="alterarQty('qtyKitComum', -1)">-</button>
                    <input type="number" id="qtyKitComum" class="qty-val" value="0" min="0" oninput="calcular()">
                    <button class="btn-qty plus" onclick="alterarQty('qtyKitComum', 1)">+</button>
                </div>
            </div>

            <div class="item-linha">
                <span>Kit Avançado <span class="label-preco">R$ 5.000,00</span></span>
                <div class="controles">
                    <button class="btn-qty" onclick="alterarQty('qtyKitAvancado', -1)">-</button>
                    <input type="number" id="qtyKitAvancado" class="qty-val" value="0" min="0" oninput="calcular()">
                    <button class="btn-qty plus" onclick="alterarQty('qtyKitAvancado', 1)">+</button>
                </div>
            </div>
            
            <div class="item-linha">
                <span>Pneu <span class="label-preco">R$ 600,00</span></span>
                <div class="controles">
                    <button class="btn-qty" onclick="alterarQty('qtyPneu', -1)">-</button>
                    <input type="number" id="qtyPneu" class="qty-val" value="0" min="0" oninput="calcular()">
                    <button class="btn-qty plus" onclick="alterarQty('qtyPneu', 1)">+</button>
                </div>
            </div>

            <div class="item-linha">
                <span>Chave Inglesa <span class="label-preco">R$ 3.000,00</span></span>
                <div class="controles">
                    <button class="btn-qty" onclick="alterarQty('qtyChave', -1)">-</button>
                    <input type="number" id="qtyChave" class="qty-val" value="0" min="0" oninput="calcular()">
                    <button class="btn-qty plus" onclick="alterarQty('qtyChave', 1)">+</button>
                </div>
            </div>

            <div class="item-linha">
                <span>Macaco Hidráulico <span class="label-preco">R$ 1.000,00</span></span>
                <div class="controles">
                    <button class="btn-qty" onclick="alterarQty('qtyMacaco', -1)">-</button>
                    <input type="number" id="qtyMacaco" class="qty-val" value="0" min="0" oninput="calcular()">
                    <button class="btn-qty plus" onclick="alterarQty('qtyMacaco', 1)">+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="resumo">
        <h3>Resumo do Orçamento</h3>
        <div class="resumo-item">
            <span>Produtos:</span>
            <span id="resProdutos">R$ 0,00</span>
        </div>

        <div class="total-label" style="margin-top:20px; font-weight:bold;">Total Final:</div>
        <div class="total-valor" id="totalFinal">R$ 0,00</div>
    </div>
</div>

<footer>
    <p>Projeto Exclusivo &copy; 2026 | Desenvolvido com muita dedicação por 
        <span class="dev-name">Reginaldo Souza</span>
    </p>
</footer>

<script>
    // Valores de controle (mesmo que os inputs estejam ocultos, mantemos as variáveis)
    let parceriaAtiva = false;
    let percentualAcrescimoExtra = 0;

    function converterParaNumero(string) {
        if (!string) return 0;
        return parseInt(string.replace(/\D/g, "")) || 0;
    }

    function formatarMoeda(valor) {
        return valor.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
    }

    function alterarQty(id, delta) {
        const input = document.getElementById(id);
        if(!input) return;
        let valorAtual = parseInt(input.value) || 0; 
        let novoValor = valorAtual + delta;
        if (novoValor < 0) novoValor = 0;
        input.value = novoValor;
        calcular();
    }

    function calcular() {
        // SEGURANÇA: Tenta pegar o valor base, se não existir (comentado), assume 0
        const inputBase = document.getElementById('valorBase');
        let baseOriginal = inputBase ? converterParaNumero(inputBase.value) : 0;
        
        let totalProdutos = ((parseInt(document.getElementById('qtyPneu')?.value) || 0) * 1000) +
                           ((parseInt(document.getElementById('qtyKitComum')?.value) || 0) * 5000) +
                           ((parseInt(document.getElementById('qtyKitAvancado')?.value) || 0) * 10000) +
                           ((parseInt(document.getElementById('qtyChave')?.value) || 0) * 10000) +
                           ((parseInt(document.getElementById('qtyMacaco')?.value) || 0) * 10000);

        let totalFinal = baseOriginal + totalProdutos;

        // Atualiza a tela apenas nos campos que estão visíveis
        const resProdutos = document.getElementById('resProdutos');
        if (resProdutos) resProdutos.innerText = formatarMoeda(totalProdutos);
        
        const resTotal = document.getElementById('totalFinal');
        if (resTotal) resTotal.innerText = formatarMoeda(totalFinal);
    }
</script>
</body>
</html>
